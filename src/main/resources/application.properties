# Server Port Configuration (default to 8443 for HTTPS)
server.port=8443

# Multipart upload limits (keep in sync with 10MB limit in Java controller and index.html)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# SSL/TLS Configuration (Comment out all server.ssl.* lines below and change server.port to 8080 to fall back to plain HTTP)
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=password
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.ssl.enabled=true

# Upload configuration
file.upload-dir=${user.home}/Downloads/
file.max-size=10485760
file.allowed-extensions=jpg,jpeg,png,gif,pdf,doc,docx,txt,zip,mp4,mp3,xls,xlsx,ppt,pptx

# Spring multipart limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB