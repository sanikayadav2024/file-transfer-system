<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>File Transfer System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 420px;
            background: #111;
            border-radius: 20px;
            padding: 20px;
            color: white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
        }

        /* QR section */
        .qr-box {
            background: #1c1c1c;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .qr-box img {
            width: 160px;
            margin-top: 10px;
            border-radius: 10px;
        }

        /* Copy link button */
        .copy-btn {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #43e97b;
            border: none;
            border-radius: 8px;
            color: #111;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .copy-btn:hover {
            background: #38c96b;
        }

        /* File input hidden */
        input[type="file"] {
            display: none;
        }

        /* Custom file button */
        .file-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .file-btn:hover {
            background: #3a8ee6;
        }

        /* Upload button */
        .upload-btn {
            width: 100%;
            padding: 10px;
            background: #ff7eb3;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .upload-btn:hover {
            background: #ff5c9a;
        }

        #fileName {
            font-size: 12px;
            color: #bbb;
            margin-bottom: 10px;
        }

        /* Progress bar */
        .progress-container {
            display: none;
            width: 100%;
            background: #2a2a2a;
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            height: 18px;
            position: relative;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4facfe, #43e97b);
            transition: width 0.15s ease;
        }

        .progress-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            color: white;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.7);
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
        }

        #status.success {
            color: #43e97b;
        }

        #status.error {
            color: #ff4d4d;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: #777;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>⚡ QuickDrop</h1>
        <h2>Scan QR to upload from mobile</h2>

        <div class="qr-box">
            <p>Scan Me</p>

            <img src="/api/qrcode" alt="QR Code">

            <button class="copy-btn" onclick="copyConnectionLink()">
                🔗 Copy Connection Link
            </button>

        </div>


        <label class="file-btn">
            📤 Choose File
            <input type="file" id="fileInput" onchange="showFileName()">
        </label>

        <p id="fileName">No file selected</p>

        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>

        <button class="upload-btn" onclick="uploadFile()">
            Upload
        </button>

        <p id="status"></p>

        <div class="footer">
            Same WiFi • HTTPS Encrypted Transfer
        </div>

    </div>


    <script>

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || '';

        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB, keep in sync with backend
        const ALLOWED_EXTENSIONS = ["jpg", "jpeg", "png", "gif", "pdf", "doc", "docx", "txt", "zip", "mp4", "mp3", "xls", "xlsx", "ppt", "pptx"];

        function setStatus(message, type) {
            const status = document.getElementById("status");
            status.innerText = message;
            status.classList.remove("success", "error");
            status.classList.add(type);
        }

        function getExtension(filename) {
            return filename.split(".").pop().toLowerCase();
        }

        function showFileName() {
            let file = document.getElementById("fileInput").files[0];
            document.getElementById("fileName").innerText = file ? file.name : "No file selected";
            document.getElementById("status").innerText = "";
            resetProgress();
        }

        function setProgress(percent) {
            const container = document.getElementById("progressContainer");
            const bar = document.getElementById("progressBar");
            const text = document.getElementById("progressText");

            container.classList.add("active");
            bar.style.width = percent + "%";
            text.innerText = percent + "%";
        }

        function resetProgress() {
            const container = document.getElementById("progressContainer");
            const bar = document.getElementById("progressBar");
            const text = document.getElementById("progressText");

            container.classList.remove("active");
            bar.style.width = "0%";
            text.innerText = "0%";
        }

        function uploadFile() {
            let file = document.getElementById("fileInput").files[0];

            if (!file) {
                setStatus("⚠️ No file selected. Please choose a file first.", "error");
                return;
            }

            if (file.size > MAX_FILE_SIZE) {
                setStatus(`⚠️ File too large. Max allowed size is ${MAX_FILE_SIZE / (1024 * 1024)}MB.`, "error");
                return;
            }

            const ext = getExtension(file.name);
            if (!ALLOWED_EXTENSIONS.includes(ext)) {
                setStatus(`⚠️ Unsupported file type ".${ext}".`, "error");
                return;
            }

            let formData = new FormData();
            formData.append("file", file);

            setStatus("⏳ Uploading...", "success");
            setProgress(0);

            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener("progress", (event) => {
                if (event.lengthComputable) {
                    const percent = Math.round((event.loaded / event.total) * 100);
                    setProgress(percent);
                    setStatus(`⏳ Uploading... ${percent}%`, "success");
                }
            });

            xhr.addEventListener("load", () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    setProgress(100);
                    setStatus("✅ " + xhr.responseText, "success");
                } else {
                    setStatus("⚠️ " + xhr.responseText, "error");
                }
                setTimeout(resetProgress, 1500);
            });

            xhr.addEventListener("error", () => {
                setStatus("❌ Network error. Check your connection and try again.", "error");
                resetProgress();
            });

            xhr.open("POST", "/files/upload");
            if (token) {
                xhr.setRequestHeader("X-Auth-Token", token);
            }
            xhr.send(formData);
        }


        function copyConnectionLink() {

            let link = window.location.href;

            // Modern clipboard API
            if (navigator.clipboard && window.isSecureContext) {

                navigator.clipboard.writeText(link)
                    .then(() => {
                        setStatus("✅ Connection link copied!", "success");
                    })
                    .catch(() => {
                        fallbackCopy(link);
                    });

            } else {
                // For local WiFi IP addresses
                fallbackCopy(link);
            }
        }


        function fallbackCopy(text) {

            let textarea = document.createElement("textarea");

            textarea.value = text;

            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";

            document.body.appendChild(textarea);

            textarea.focus();
            textarea.select();

            try {

                document.execCommand("copy");

                setStatus("✅ Connection link copied!", "success");

            } catch (err) {

                setStatus("❌ Copy failed", "error");

            }

            document.body.removeChild(textarea);
        }
    </script>


</body>

</html>
