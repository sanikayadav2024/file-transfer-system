<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Transfer System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 95%;
            max-width: 420px;
            background: #111;
            border-radius: 20px;
            padding: 20px;
            color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            text-align: center;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
        }

        /* QR section */
        .qr-box {
            background: #1c1c1c;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .qr-box img {
            width: 160px;
            margin-top: 10px;
            border-radius: 10px;
        }

        /* File input hidden */
        input[type="file"] {
            display: none;
        }

        /* Custom file button */
        .file-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: #4facfe;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        .file-btn:hover {
            background: #3a8ee6;
        }

        /* Upload button */
        .upload-btn {
            width: 100%;
            padding: 10px;
            background: #ff7eb3;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        .upload-btn:hover {
            background: #ff5c9a;
        }

        #fileName {
            font-size: 12px;
            color: #bbb;
            margin-bottom: 10px;
        }

        #status {
            margin-top: 12px;
            font-size: 13px;
            color: #0f0;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: #777;
        }

        /* Metadata Card Styles */
        .metadata-card {
            background: rgba(28, 28, 28, 0.95);
            border: 1px solid rgba(79, 172, 254, 0.4);
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out;
            backdrop-filter: blur(8px);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .metadata-card h3 {
            font-size: 14px;
            color: #4facfe;
            margin-bottom: 10px;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid rgba(79, 172, 254, 0.2);
            padding-bottom: 6px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .meta-row:last-child {
            border-bottom: none;
        }

        .meta-label {
            color: #888;
            font-weight: 300;
        }

        .meta-value {
            color: #eee;
            font-weight: 500;
            word-break: break-all;
            text-align: right;
            max-width: 65%;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>⚡ QuickDrop</h1>
    <h2>Scan QR to upload from mobile</h2>

    <div class="qr-box">
        <p>Scan Me</p>
        <img src="/api/qrcode" alt="QR Code">

    </div>

    <!-- Custom file button -->
    <label class="file-btn">
        📤 Choose File
        <input type="file" id="fileInput" onchange="showFileName()">
    </label>

    <p id="fileName">No file selected</p>

    <button class="upload-btn" onclick="uploadFile()">Upload</button>

    <p id="status"></p>

    <!-- Metadata Card -->
    <div id="metadataCard" class="metadata-card" style="display: none;">
        <h3>🎉 Upload Successful</h3>
        <div class="meta-row">
            <span class="meta-label">File Name</span>
            <span id="metaName" class="meta-value">-</span>
        </div>
        <div class="meta-row">
            <span class="meta-label">Size</span>
            <span id="metaSize" class="meta-value">-</span>
        </div>
        <div class="meta-row">
            <span class="meta-label">Type</span>
            <span id="metaType" class="meta-value">-</span>
        </div>
        <div class="meta-row">
            <span class="meta-label">Uploaded At</span>
            <span id="metaTime" class="meta-value">-</span>
        </div>
    </div>

    <div class="footer">
        Same WiFi • Secure Transfer
    </div>

</div>

<script>
    function showFileName() {
        let file = document.getElementById("fileInput").files[0];
        document.getElementById("fileName").innerText = file ? file.name : "No file selected";
    }

    function getFriendlyFileType(contentType, filename) {
        if (!contentType) {
            contentType = "";
        }
        
        let lowerType = contentType.toLowerCase();
        
        if (lowerType.startsWith("image/")) {
            return "🖼️ Image (" + contentType + ")";
        }
        if (lowerType.startsWith("video/")) {
            return "🎥 Video (" + contentType + ")";
        }
        if (lowerType.startsWith("audio/")) {
            return "🎵 Audio (" + contentType + ")";
        }
        if (lowerType === "application/pdf") {
            return "📄 PDF Document";
        }
        if (lowerType.startsWith("text/")) {
            return "📝 Text File";
        }
        if (lowerType.includes("zip") || lowerType.includes("rar") || lowerType.includes("tar") || lowerType.includes("gzip") || lowerType.includes("compressed")) {
            return "📦 Archive File";
        }
        if (lowerType.includes("word") || lowerType.includes("officedocument.wordprocessingml")) {
            return "📄 Word Document";
        }
        if (lowerType.includes("excel") || lowerType.includes("officedocument.spreadsheetml")) {
            return "📊 Spreadsheet";
        }
        if (lowerType.includes("powerpoint") || lowerType.includes("officedocument.presentationml")) {
            return "📉 Presentation";
        }
        
        // Fallback to extension if type is application/octet-stream or generic
        let ext = filename.split('.').pop().toLowerCase();
        if (ext && ext !== filename) {
            return "📄 " + ext.toUpperCase() + " File";
        }
        
        return "📁 Binary File";
    }

    function uploadFile() {
        let file = document.getElementById("fileInput").files[0];

        if (!file) {
            alert("Select a file first!");
            return;
        }

        let formData = new FormData();
        formData.append("file", file);

        let statusEl = document.getElementById("status");
        statusEl.innerText = "Uploading...";
        statusEl.style.color = "#ff7eb3";
        
        let cardEl = document.getElementById("metadataCard");
        cardEl.style.display = "none";

        fetch("/files/upload", {
            method: "POST",
            body: formData
        })
        .then(res => {
            if (!res.ok) {
                return res.text().then(text => { throw new Error(text) });
            }
            return res.json();
        })
        .then(metadata => {
            statusEl.innerText = "Upload complete!";
            statusEl.style.color = "#0f0";
            
            // Populate metadata card
            document.getElementById("metaName").innerText = metadata.originalName;
            document.getElementById("metaSize").innerText = metadata.formattedSize || (Math.round(metadata.size / 1024 * 100) / 100 + " KB");
            document.getElementById("metaType").innerText = getFriendlyFileType(metadata.contentType, metadata.originalName);
            document.getElementById("metaTime").innerText = new Date(metadata.uploadTime).toLocaleString();
            
            // Show the card
            cardEl.style.display = "block";
            
            // Clear file input
            document.getElementById("fileInput").value = "";
            document.getElementById("fileName").innerText = "No file selected";
        })
        .catch(err => {
            statusEl.innerText = err.message || "Upload failed";
            statusEl.style.color = "#ff4a4a";
            console.error(err);
        });
    }
</script>

</body>
</html>
